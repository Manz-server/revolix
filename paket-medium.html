<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paket Medium - Lite Hosting Minecraft</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#050814;color:#fff;min-height:100vh;overflow-x:hidden;scroll-behavior:smooth;}
header{position:fixed;top:0;width:100%;height:75px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;backdrop-filter:blur(15px);background:rgba(5,10,25,.6);z-index:1000;}
.logo img{height:38px;}
.hamburger{width:28px;height:22px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;}
.hamburger span{height:3px;width:100%;background:#fff;border-radius:3px;}
.bg{position:fixed;inset:0;background:url('minecraft-medium.jpg') center/cover no-repeat;z-index:-2;transform:scale(1.05);}
.bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom, rgba(5,8,20,.85), rgba(5,8,20,.95));}
.container{padding:130px 25px 60px;max-width:480px;margin:auto;}
.badge{display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:999px;background:linear-gradient(135deg,#3a7bff,#00c6ff);font-weight:600;margin-bottom:40px;box-shadow:0 0 40px rgba(0,150,255,.35);}
h1{font-size:42px;font-weight:800;margin-bottom:20px;}
.desc{color:#b7c8e8;line-height:1.7;margin-bottom:35px;}
.features{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:40px;}
.feature{display:flex;align-items:center;gap:8px;color:#dbeafe;}
.feature i{color:#3aa9ff;}
.products{padding:40px 20px 100px;max-width:480px;margin:auto;}
.product-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:26px;margin-bottom:30px;position:relative;opacity:0;transform:translateY(40px);transition:opacity 0.7s ease, transform 0.7s ease;}
.product-card.show{opacity:1;transform:translateY(0);}
.status, .available{position:absolute;top:24px;right:24px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;}
.available{background:rgba(0,255,150,.08);border:1px solid rgba(0,255,150,.3);color:#34d399;}
.status.habis{background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.4);color:#ef4444;}
.product-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.price{font-size:38px;font-weight:800;margin:18px 0;}
.price span{font-size:16px;color:#9ca3af;}
.spec-list{margin:18px 0 26px;}
.spec{display:flex;align-items:center;gap:12px;margin-bottom:14px;color:#cbd5f5;}
.spec i{color:#3b82f6;}
.choose-btn{width:100%;height:56px;border:none;border-radius:18px;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;}
.choose-btn.disabled{background:#374151;color:#9ca3af;cursor:not-allowed;}

/* ================= FOOTER ================= */

.footer{
  background: linear-gradient(180deg,#050814,#02040a);
  padding: 70px 20px 90px;
  text-align: center;
  border-top: 1px solid rgba(0,170,255,0.15);
}

.footer-content{
  max-width: 1100px;
  margin: auto;
}

.footer-brand{
  margin-bottom: 25px;
}

.logo-big{
  width: 70px;
  height: auto;
  max-width: 100%;
  object-fit: contain;
  margin-bottom: 15px;
}

.brand-text{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
}

.logo-small{
  width: 24px;
  height: auto;
  object-fit: contain;
}

.brand-text .blue{
  color: #3aa9ff;
}

.footer-desc{
  margin-top: 16px;
  font-size: 14px;
  color: #9ca3af;
}

.footer-made{
  margin-top: 6px;
  font-size: 13px;
  color: #cbd5f5;
}

.footer-social{
  margin-top: 22px;
  display: flex;
  justify-content: center;
  gap: 14px;
}

.footer-social a{
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(255,255,255,.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #fff;
  text-decoration: none;
  transition: 0.3s ease;
}

.footer-social a:hover{
  background: #3aa9ff;
  transform: translateY(-4px);
}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="logo-kanan.png" alt="REVOLIX Logo"></div>
  <div class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></div>
</header>

<div class="bg"></div>

<div class="container">
  <div class="badge"><i class="fa-solid fa-trophy"></i> Paket Medium Lengkap</div>
  <h1>Medium Hosting<br>Minecraft</h1>
  <p class="desc">Paket dari RAM 1GB sampai 16GB dengan CPU AMD EPYC 7443P. Pilih sesuai kebutuhan server kamu!</p>
  <div class="features">
    <div class="feature"><i class="fa-solid fa-check"></i>99.9% Uptime</div>
    <div class="feature"><i class="fa-solid fa-check"></i>DDoS Protection</div>
    <div class="feature"><i class="fa-solid fa-check"></i>24/7 Support</div>
  </div>
</div>

<section class="products" id="productContainer"></section>

<script>
// SET STATUS PAKET: true = habis, false = tersedia
const paketStatus = {
  1: false, 2: false, 3: true, 4: false, 5: false, 6: true,
  7: false, 8: false, 9: false, 10: false, 11: false, 12: false,
  13: false, 14: false, 15: false, 16: false
};

const container = document.getElementById("productContainer");
const maxCore = 4;
const basePrice = 15000;

const coreConfig = {
  1: 1,
  2: 1,
  3: 2,
  4: 3,
  5: 4,
  6: 4,
  7: 4,
  8: 4,
  9: 4,
  10: 4,
  11: 4,
  12: 4,
  13: 4,
  14: 4,
  15: 4,
  16: 4
};
for(let i=1;i<=16;i++){
  const ram = i;
  const core = i>maxCore?maxCore:i;
  const disk = ram*2;
  const price = basePrice*i;
  const isHabis = paketStatus[i];
  container.innerHTML += `
  <div class="product-card fade-scroll">
    <div class="${isHabis?'status habis':'available'}">
      <i class="fa-solid ${isHabis?'fa-circle-exclamation':'fa-circle'}"></i> ${isHabis?'HABIS':'TERSEDIA'}
    </div>
    <div class="product-title">Medium ${i}</div>
    <div class="price">Rp${price.toLocaleString('id-ID')} <span>/bulan</span></div>
    <div class="spec-list">
      <div class="spec"><i class="fa-solid fa-memory"></i> ${ram} GB RAM</div>
      <div class="spec"><i class="fa-solid fa-hard-drive"></i> ${disk} GB NVMe SSD</div>
      <div class="spec"><i class="fa-solid fa-microchip"></i> ${core} Core AMD EPYC 7443P</div>
    </div>
    <button class="choose-btn ${isHabis?'disabled':''}" ${isHabis?'disabled':''}
      onclick="${isHabis?'return false;':`window.location.href='detail.html?paket=medium${i}&ram=${ram}&cpu=${core}&disk=${disk}&harga=${price}'`}">
      <i class="fa-solid fa-server"></i> Pilih Paket →
    </button>
  </div>`;
}

// Fade scroll
function fadeInScroll(){
  const elements = document.querySelectorAll(".fade-scroll");
  const trigger = window.innerHeight*0.9;
  elements.forEach(el=>{
    if(el.getBoundingClientRect().top<trigger) el.classList.add("show");
  });
}
window.addEventListener("scroll",fadeInScroll);
window.addEventListener("load",fadeInScroll);
</script>
<footer class="footer">
  <div class="footer-content">

    <div class="footer-brand">
      <img src="logo-besar.png" alt="REVOLIX Logo" class="logo-big">

      <div class="brand-text">
        <img src="logo-kanan.png" alt="Logo Small" class="logo-small">
        REVOLIX<span class="blue">HOST</span>
      </div>
    </div>

    <p class="footer-desc">
      Thx sudah mengunjungi web kami.
    </p>

    <p class="footer-made">
      Made by <strong>@manznomarga</strong>
    </p>

    <div class="footer-social">
  <a href="https://discord.gg/YJnR5jQazt" target="_blank">
    <i class="fa-brands fa-discord"></i>
  </a>

  <a href="https://wa.me/6287745935987" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <a href="https://tiktok.com/@revolix.com" target="_blank">
    <i class="fa-brands fa-tiktok"></i>
  </a>
</div>

  </div>
</footer>
</body>
</html>
